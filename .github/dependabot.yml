# Dependabot version updates (security audit M-03).
#
# Complements Dependabot *security* updates (enabled in repo settings, which
# open fix PRs for known-vulnerable deps) with scheduled *version* updates so
# the tree does not silently drift. The `postcss` override history showed this
# was already the de-facto process — this makes it explicit and automatic.
#
# PRs target `dev` (the integration branch), then ride the normal dev → uat →
# main promotion. Grouped to keep PR volume sane.

version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      # One PR for routine minor/patch bumps; majors still come individually
      # so they get a deliberate review.
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Toolchain majors that break the build/lint today and are gated on
      # ecosystem readiness (Next.js + type/lint-plugin support). They are
      # deferred to a DELIBERATE migration, not weekly auto-PRs — otherwise a
      # perpetually-red PR risks an accidental force-merge and adds noise.
      # Minor/patch for both still flow (security + bugfixes). Revisit + remove
      # these when doing the migration — tracked in deployment.md TODO.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "github-actions"]

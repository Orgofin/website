<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 96" width="300" height="96" role="img" aria-label="Concept 1 — Nexus: Orgofin">
  <defs>
    <linearGradient id="nexusGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B5BFF"/>
      <stop offset="1" stop-color="#6E44FF"/>
    </linearGradient>
  </defs>
  <!-- Mark: a Company-Brain graph — 6 nodes on a ring wired to a bright core -->
  <g transform="translate(48,48)" fill="none" stroke="url(#nexusGrad)" stroke-width="2.4" stroke-linecap="round">
    <!-- ring edges -->
    <polygon points="20,0 10,17.32 -10,17.32 -20,0 -10,-17.32 10,-17.32" opacity="0.55"/>
    <!-- spokes to core -->
    <line x1="0" y1="0" x2="20" y2="0"/>
    <line x1="0" y1="0" x2="10" y2="17.32"/>
    <line x1="0" y1="0" x2="-10" y2="17.32"/>
    <line x1="0" y1="0" x2="-20" y2="0"/>
    <line x1="0" y1="0" x2="-10" y2="-17.32"/>
    <line x1="0" y1="0" x2="10" y2="-17.32"/>
  </g>
  <g transform="translate(48,48)" fill="url(#nexusGrad)">
    <circle cx="20" cy="0" r="3.2"/>
    <circle cx="10" cy="17.32" r="3.2"/>
    <circle cx="-10" cy="17.32" r="3.2"/>
    <circle cx="-20" cy="0" r="3.2"/>
    <circle cx="-10" cy="-17.32" r="3.2"/>
    <circle cx="10" cy="-17.32" r="3.2"/>
    <circle cx="0" cy="0" r="5.4"/>
  </g>
  <!-- Wordmark -->
  <text x="92" y="58" font-family="Geist, 'Segoe UI', system-ui, sans-serif" font-size="34" font-weight="600" letter-spacing="-1" fill="#0B1020">Orgofin</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Orgofin">
  <!-- Solid disc + custom modular "F". Inverts with the viewer's colour scheme:
       light = purple disc + white F, dark = white disc + dark F. -->
  <style>
    .disc { fill: #7c3aed; }
    .fmark { fill: #ffffff; }
    @media (prefers-color-scheme: dark) {
      .disc { fill: #ffffff; }
      .fmark { fill: #0b1020; }
    }
  </style>
  <circle class="disc" cx="32" cy="32" r="31"/>
  <g class="fmark">
    <rect x="20" y="11.5" width="7" height="7"/>
    <rect x="28.5" y="11.5" width="7" height="7"/>
    <rect x="37" y="11.5" width="7" height="7"/>
    <rect x="20" y="20" width="7" height="7"/>
    <rect x="20" y="28.5" width="7" height="7"/>
    <rect x="28.5" y="28.5" width="7" height="7"/>
    <rect x="20" y="37" width="7" height="7"/>
    <rect x="20" y="45.5" width="7" height="7"/>
  </g>
</svg>
